<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal Town | لوحة التحكم الجديدة</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #349ae9;
            --bg: #060d16;
            --card: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .admin-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--primary);
            color: white;
            border-radius: 8px;
            font-family: 'Cairo';
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        .status { margin-top: 15px; font-size: 14px; color: #4caf50; display: none; }
    </style>
</head>
<body>

    <div class="admin-card">
        <i class="fas fa-user-shield fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
        <h2>إدارة Ideal Town الجديدة</h2>
        <p>أضف محتوى لقاعدة البيانات مباشرة</p>
        
        <hr style="opacity: 0.1; margin: 20px 0;">

        <input type="text" id="itemTitle" placeholder="العنوان (مثلاً: قانون الطيران)">
        <textarea id="itemDesc" rows="4" placeholder="الوصف أو نص القانون..."></textarea>
        
        <button onclick="saveData()">نشر الآن <i class="fas fa-paper-plane"></i></button>
        
        <div id="statusMsg" class="status">تم النشر بنجاح في السيرفر الجديد! ✓</div>
    </div>

    <script>
        // إعدادات Firebase من صورتك الأخيرة
        const firebaseConfig = {
            apiKey: "AIzaSyACXJdBLFAJJvGRtawSj6el_yvWpDkG_vU",
            authDomain: "ideal-website-2786f.firebaseapp.com",
            databaseURL: "https://ideal-website-2786f-default-rtdb.firebaseio.com",
            projectId: "ideal-website-2786f",
            storageBucket: "ideal-website-2786f.appspot.com",
            messagingSenderId: "644257022389",
            appId: "1:644257022389:web:fbdf65d839385d820054c2"
        };

        // تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function saveData() {
            const title = document.getElementById('itemTitle').value;
            const desc = document.getElementById('itemDesc').value;

            if(title && desc) {
                // إرسال البيانات لقسم اسمه "news" في السيرفر
                database.ref('news').push({
                    title: title,
                    description: desc,
                    date: new Date().toLocaleString()
                }).then(() => {
                    document.getElementById('statusMsg').style.display = 'block';
                    document.getElementById('itemTitle').value = '';
                    document.getElementById('itemDesc').value = '';
                    setTimeout(() => {
                        document.getElementById('statusMsg').style.display = 'none';
                    }, 3000);
                });
            } else {
                alert("الرجاء تعبئة جميع الحقول!");
            }
        }
    </script>
</body>
</html>
